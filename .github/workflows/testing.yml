name: CI
permissions:
  contents: read

on:
  push:
    branches:
      - main
    tags: "*"
  pull_request:

env:
  ERT_SHOW_BACKTRACE: 1
  UV_SYSTEM_PYTHON: 1

jobs:
  tests:
    name: "Python ${{ matrix.python-version }} on ${{ matrix.os }}${{ matrix.pandas-version && format(' (pandas {0})', matrix.pandas-version) || '' }}"
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        pandas-version: [">3"]
        os: [ ubuntu-latest ]
        include:
          - python-version: "3.14"
            os: macos-latest
          - python-version: "3.14"
            pandas-version: ">=2,<3"
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "${{ matrix.python-version }}"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          prune-cache: false
          cache-dependency-glob: pyproject.toml
          python-version: "${{ matrix.python-version }}"

      - name: Install Ubuntu dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install libegl1
        shell: bash

      - name: Install test dependencies
        run: |
          uv sync --frozen --extra test

      - name: Pin pandas version
        if: matrix.pandas-version
        run: uv pip install "pandas${{ matrix.pandas-version }}"

      - name: "Run tests"
        run: uv run --no-sync pytest tests -n logical --durations 5 --ert-integration

      - name: "Run doctests on fmudesign"
        run: uv run --no-sync pytest ./src/semeio/fmudesign/ --doctest-modules -v
